<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2P Runner Pro</title>
<style>
body { margin:0; background:#0a0a0a; overflow:hidden; font-family:sans-serif; }
canvas { display:block; margin:auto; background:linear-gradient(#111,#222); }

#ui {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>
<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="best">Best: 0</div>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// SCORE SYSTEM (SAVE DEVICE)
let score = 0;
let best = localStorage.getItem("bestScore") || 0;
document.getElementById("best").innerText = "Best: " + best;

// PLAYERS
let p1 = { x:200, y:300, w:30, h:30, color:"cyan" };
let p2 = { x:250, y:300, w:30, h:30, color:"orange" };

// OBSTACLES
let obs = [];
let frame = 0;

// SPEED
let speed = 6;

// INPUT
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// SPAWN OBSTACLE (pseudo 3D effect)
function spawn(){
  let lane = Math.floor(Math.random()*3); // 3 lane
  obs.push({
    x:900,
    y:250 + lane*60,
    w:30,
    h:30,
    depth: Math.random()
  });
}

// COLLISION
function hit(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

// GAMEPAD SUPPORT (2 stick)
function getPad(i){
  let pads = navigator.getGamepads();
  return pads[i];
}

// UPDATE
function update(){

  // PLAYER 1 (keyboard)
  if(keys["w"]) p1.y -= 6;
  if(keys["s"]) p1.y += 6;
  if(keys["a"]) p1.x -= 6;
  if(keys["d"]) p1.x += 6;

  // PLAYER 2 (stick 2)
  let gp2 = getPad(1);
  if(gp2){
    let x = gp2.axes[0];
    let y = gp2.axes[1];

    p2.x += x * 6;
    p2.y += y * 6;
  }

  // LIMIT AREA
  [p1,p2].forEach(p=>{
    p.x = Math.max(0,Math.min(900,p.x));
    p.y = Math.max(200,Math.min(450,p.y));
  });

  // OBSTACLES MOVE
  obs.forEach(o=>{
    o.x -= speed;
  });

  obs = obs.filter(o=>o.x>-50);

  if(frame % 50 === 0) spawn();

  // COLLISION
  for(let o of obs){
    if(hit(p1,o) || hit(p2,o)){
      if(score > best){
        localStorage.setItem("bestScore", score);
      }
      alert("Game Over!");
      location.reload();
    }
  }

  // SCORE
  score++;
  document.getElementById("score").innerText = "Score: " + score;

  frame++;
}

// DRAW (pseudo 3D effect)
function draw(){

  ctx.clearRect(0,0,900,500);

  // ROAD (3D illusion)
  ctx.fillStyle = "#333";
  ctx.fillRect(0,200,900,300);

  // LANE LINES
  ctx.strokeStyle = "#555";
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(0,200+i*60);
    ctx.lineTo(900,200+i*60);
    ctx.stroke();
  }

  // OBSTACLES
  obs.forEach(o=>{
    ctx.fillStyle = "red";
    ctx.fillRect(o.x,o.y,o.w,o.h);
  });

  // PLAYERS
  ctx.fillStyle = p1.color;
  ctx.fillRect(p1.x,p1.y,p1.w,p1.h);

  ctx.fillStyle = p2.color;
  ctx.fillRect(p2.x,p2.y,p2.w,p2.h);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
