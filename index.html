<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2D Football Full Logic</title>
<style>
body { margin:0; background:#063b1f; overflow:hidden; font-family:sans-serif; }
canvas { display:block; margin:auto; background:#0a7a3a; }

#ui {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

#center {
  position:fixed;
  top:10px;
  right:10px;
  color:white;
  font-size:18px;
}
</style>
</head>
<body>

<div id="ui">
  <div id="score">0 : 0</div>
</div>

<div id="center">
  ⏱ <span id="time">300</span>s
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// SCORE
let s1 = 0;
let s2 = 0;

// TIMER (5 menit = 300 detik)
let time = 300;

// PLAYERS
let p1 = { x:200, y:250, w:25, h:25, speed:5 };
let p2 = { x:700, y:250, w:25, h:25, speed:5 };

// BALL
let ball = { x:450, y:250, w:15, h:15, vx:4, vy:2 };

// GAMEPAD
function pad(i){
  return navigator.getGamepads()[i];
}

// COLLISION
function hit(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

// RESET BALL
function reset(dir){
  ball.x = 450;
  ball.y = 250;
  ball.vx = dir * 4;
  ball.vy = 2;
}

// TIMER
setInterval(() => {
  if(time > 0) time--;
  document.getElementById("time").innerText = time;

  if(time === 0){
    alert(
      s1 > s2 ? "Player 1 Win!" :
      s2 > s1 ? "Player 2 Win!" :
      "Draw!"
    );
    location.reload();
  }
}, 1000);

// UPDATE
function update(){

  let p1pad = pad(0);
  let p2pad = pad(1);

  // ===== PLAYER 1 =====
  if(p1pad){
    let x = p1pad.axes[0];
    let y = p1pad.axes[1];

    if(Math.abs(x) > 0.2) p1.x += x * p1.speed;
    if(Math.abs(y) > 0.2) p1.y += y * p1.speed;

    // kick ✕
    if(p1pad.buttons[0].pressed && hit(p1,ball)){
      ball.vx = 6;
    }
  }

  // ===== PLAYER 2 =====
  if(p2pad){
    let x = p2pad.axes[0];
    let y = p2pad.axes[1];

    if(Math.abs(x) > 0.2) p2.x += x * p2.speed;
    if(Math.abs(y) > 0.2) p2.y += y * p2.speed;

    // kick ✕
    if(p2pad.buttons[0].pressed && hit(p2,ball)){
      ball.vx = -6;
    }
  }

  // ===== BALL PHYSICS =====
  ball.x += ball.vx;
  ball.y += ball.vy;

  // friction
  ball.vx *= 0.99;
  ball.vy *= 0.99;

  // ===== WALL BOUNCE =====
  if(ball.y < 0 || ball.y > 500){
    ball.vy *= -1;
  }

  // ===== GOAL =====
  if(ball.x < 0){
    s2++;
    document.getElementById("score").innerText = s1 + " : " + s2;
    reset(1);
  }

  if(ball.x > 900){
    s1++;
    document.getElementById("score").innerText = s1 + " : " + s2;
    reset(-1);
  }

  // LIMIT PLAYER
  [p1,p2].forEach(p=>{
    p.x = Math.max(0,Math.min(900,p.x));
    p.y = Math.max(0,Math.min(500,p.y));
  });

}

// DRAW
function draw(){

  ctx.clearRect(0,0,900,500);

  // FIELD
  ctx.fillStyle="#0a7a3a";
  ctx.fillRect(0,0,900,500);

  // CENTER LINE
  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(450,0);
  ctx.lineTo(450,500);
  ctx.stroke();

  // PLAYERS
  ctx.fillStyle="cyan";
  ctx.fillRect(p1.x,p1.y,p1.w,p1.h);

  ctx.fillStyle="orange";
  ctx.fillRect(p2.x,p2.y,p2.w,p2.h);

  // BALL
  ctx.fillStyle="white";
  ctx.fillRect(ball.x,ball.y,ball.w,ball.h);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
