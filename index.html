<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stadium Runner Pro</title>

<style>
body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }

canvas { display:block; margin:auto; }

#menu {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
}

button {
  padding:15px 25px;
  margin:10px;
  font-size:18px;
  cursor:pointer;
}

#ui {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:16px;
}

#status {
  position:fixed;
  top:10px;
  right:10px;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🏟️ STADIUM RUNNER</h1>
  <button onclick="startGame('single')">Single Player</button>
  <button onclick="startGame('multi')">Multiplayer (2 Stick)</button>
</div>

<!-- UI -->
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="best">Best: 0</div>
</div>

<div id="status">
  🎮 P1: <span id="p1">🔴</span><br>
  🎮 P2: <span id="p2">🔴</span>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = "none";

// SCORE
let score = 0;
let best = localStorage.getItem("bestScore") || 0;
document.getElementById("best").innerText = "Best: " + best;

// PLAYERS
let p1 = { x:200, y:320, w:30, h:30, color:"cyan" };
let p2 = { x:260, y:320, w:30, h:30, color:"orange" };

// OBSTACLES
let obs = [];
let frame = 0;

// KEYBOARD
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// START GAME
function startGame(m){
  mode = m;
  document.getElementById("menu").style.display = "none";
}

// SPAWN OBSTACLE
function spawn(){
  let lane = Math.floor(Math.random()*3);
  obs.push({
    x:900,
    y:260 + lane*60,
    w:30,
    h:30
  });
}

// COLLISION
function hit(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

// GAMEPAD AUTO ASSIGN (FIX STICK ERROR)
let players = { p1:null, p2:null };

function scanPads(){
  let pads = navigator.getGamepads();

  let list = [];
  for(let i=0;i<pads.length;i++){
    if(pads[i]) list.push(pads[i]);
  }

  players.p1 = list[0] || null;
  players.p2 = list[1] || null;

  requestAnimationFrame(scanPads);
}
scanPads();

// UPDATE CONTROLS
function control(){

  // PLAYER 1 (keyboard)
  if(keys["w"]) p1.y -= 6;
  if(keys["s"]) p1.y += 6;
  if(keys["a"]) p1.x -= 6;
  if(keys["d"]) p1.x += 6;

  // PLAYER 2 (stick)
  let gp2 = players.p2;
  if(gp2){
    let x = gp2.axes[0];
    let y = gp2.axes[1];

    if(Math.abs(x)>0.2) p2.x += x*5;
    if(Math.abs(y)>0.2) p2.y += y*5;

    if(gp2.buttons[0].pressed) p2.y -= 8;
  }

  // LIMIT AREA
  [p1,p2].forEach(p=>{
    p.x = Math.max(0,Math.min(900,p.x));
    p.y = Math.max(200,Math.min(450,p.y));
  });

  requestAnimationFrame(control);
}
control();

// UPDATE GAME
function update(){

  obs.forEach(o => o.x -= 6);
  obs = obs.filter(o => o.x > -50);

  if(frame % 60 === 0) spawn();

  for(let o of obs){
    if(hit(p1,o) || hit(p2,o)){
      if(score > best){
        localStorage.setItem("bestScore", score);
      }
      alert("Game Over!");
      location.reload();
    }
  }

  score++;
  document.getElementById("score").innerText = "Score: " + score;

  frame++;
}

// DRAW STADIUM
function draw(){

  ctx.clearRect(0,0,900,500);

  // SKY
  let sky = ctx.createLinearGradient(0,0,0,500);
  sky.addColorStop(0,"#070b1f");
  sky.addColorStop(1,"#111");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,900,500);

  // CROWD
  ctx.fillStyle = "#222";
  ctx.fillRect(0,0,900,180);

  for(let i=0;i<150;i++){
    ctx.fillStyle = Math.random()>0.5 ? "#555" : "#777";
    ctx.fillRect(Math.random()*900, Math.random()*180, 2,2);
  }

  // TRACK (pseudo 3D)
  ctx.fillStyle = "#1a1a1a";
  ctx.beginPath();
  ctx.moveTo(150,180);
  ctx.lineTo(750,180);
  ctx.lineTo(900,500);
  ctx.lineTo(0,500);
  ctx.closePath();
  ctx.fill();

  // LINES
  ctx.strokeStyle = "#333";
  for(let i=0;i<6;i++){
    ctx.beginPath();
    let y = 180 + i*60;
    ctx.moveTo(150,y);
    ctx.lineTo(750,y);
    ctx.stroke();
  }

  // OBSTACLES
  ctx.fillStyle = "red";
  obs.forEach(o=>{
    ctx.fillRect(o.x,o.y,o.w,o.h);
  });

  // PLAYERS
  ctx.fillStyle = p1.color;
  ctx.fillRect(p1.x,p1.y,p1.w,p1.h);

  ctx.fillStyle = p2.color;
  ctx.fillRect(p2.x,p2.y,p2.w,p2.h);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
